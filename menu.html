<link rel="stylesheet" href="theme.css">
<style>
.menu-head{padding:26px 5% 8px}
.menu-wrap{max-width:1220px;margin:0 auto}
.menu-filters{display:flex;flex-wrap:wrap;gap:8px;padding:0 0 24px}
.filter-btn{background:transparent;border:1px solid rgba(217,145,30,.28);color:var(--muted);padding:10px 16px;letter-spacing:1.4px;text-transform:uppercase;font-size:11px;cursor:pointer;transition:.25s}
.filter-btn:hover,.filter-btn.active{border-color:var(--gold);color:var(--gold);background:rgba(217,145,30,.12)}
.menu-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.menu-card{background:var(--card);border:1px solid rgba(217,145,30,.16);overflow:hidden;transition:transform .25s}
.menu-card:hover{transform:translateY(-4px)}
.menu-card-img{height:220px;background-size:cover;background-position:center}
.menu-card-body{padding:18px}
.menu-card-top{display:flex;justify-content:space-between;gap:10px;align-items:flex-start;margin-bottom:8px}
.menu-card h3{font-family:var(--serif);font-size:26px;line-height:1.1}
.price{font-family:var(--serif);color:var(--gold);font-size:22px;white-space:nowrap}
.menu-card p{color:var(--muted);line-height:1.7;font-size:14px}
.badge{display:inline-block;margin-top:10px;border:1px solid rgba(217,145,30,.35);padding:4px 10px;font-size:10px;letter-spacing:1.4px;color:var(--gold);text-transform:uppercase}
.menu-card-actions{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-top:14px}
.add-btn{background:transparent;border:1px solid rgba(217,145,30,.4);color:var(--gold);padding:8px 12px;font-size:10px;letter-spacing:1.6px;text-transform:uppercase;cursor:pointer;transition:.22s}
.add-btn:hover{background:rgba(217,145,30,.12);border-color:var(--gold-soft)}
.nav-right{display:flex;align-items:center}
.nav-cart{background:transparent;border:1px solid rgba(217,145,30,.35);color:var(--gold);padding:9px 14px;font-size:11px;letter-spacing:1.6px;text-transform:uppercase;cursor:pointer;transition:.22s;display:inline-flex;align-items:center;gap:8px}
.nav-cart:hover{background:rgba(217,145,30,.12)}
.cart-count{background:#c33;color:#fff;min-width:18px;height:18px;padding:0 5px;border-radius:999px;display:inline-flex;align-items:center;justify-content:center;font-size:10px;font-weight:700}
.menu-toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(90px);background:#1a1512;border:1px solid rgba(217,145,30,.45);color:var(--text);padding:10px 16px;font-size:12px;letter-spacing:.4px;z-index:200;transition:transform .3s}
.menu-toast.show{transform:translateX(-50%) translateY(0)}
@media (max-width:1020px){.menu-grid{grid-template-columns:1fr 1fr}}
@media (max-width:700px){.menu-grid{grid-template-columns:1fr}.menu-card-img{height:200px}}
</style>

const labels={desi:'Desi Kitchen',chinese:'Chinese Wok',fastfood:'Fast Food',desserts:'Desserts'};
let active='desi';
const PROVIDED_IMGS = window.PROVIDED_IMGS || {};
const CART_KEY = 'zaiqa_cart';

const params = new URLSearchParams(window.location.search);
const catFromQuery = params.get('cat');
const catFromHash = window.location.hash.startsWith('#cat=') ? window.location.hash.replace('#cat=','') : '';
if (MENU[catFromQuery]) active = catFromQuery;
else if (MENU[catFromHash]) active = catFromHash;

function renderFilters(){
  const host=document.getElementById('menuFilters');
  host.innerHTML=Object.keys(MENU).map(k=>`<button class="filter-btn ${k===active?'active':''}" onclick="setCat('${k}')">${labels[k]}</button>`).join('');
}

function renderCards(){
  const host=document.getElementById('menuGrid');
  host.innerHTML=MENU[active].map(item=>`
    <article class="menu-card reveal">
      <div class="menu-card-img" style="background-image:url('${getDishImage(item.img)}')"></div>
      <div class="menu-card-body">
        <div class="menu-card-top">
          <h3>${item.name}</h3>
          <span class="price">Rs. ${item.price}</span>
        </div>
        <p>${item.desc}</p>
        ${item.badge?`<span class="badge">${item.badge}</span>`:''}
        <div class="menu-card-actions">
          <span></span>
          <button class="add-btn" onclick="quickAdd(${item.id})">Add +</button>
        </div>
      </div>
    </article>`).join('');
  document.querySelectorAll('.menu-card.reveal').forEach((el,i)=>setTimeout(()=>el.classList.add('visible'),i*80));
}

function setCat(cat){ active=cat; renderFilters(); renderCards(); }

function getDishImage(key){
  return PROVIDED_IMGS[key] || IMG_URLS[key] || '';
}

function getAllItems(){ return Object.values(MENU).flat(); }
function getItem(id){ return getAllItems().find(x=>x.id===id); }
function loadCart(){
  try{return JSON.parse(localStorage.getItem(CART_KEY)||'[]');}
  catch{return []}
}
function saveCart(cart){ localStorage.setItem(CART_KEY, JSON.stringify(cart)); }
function updateCartCount(){
  const cart = loadCart();
  const qty = cart.reduce((sum, it)=>sum + it.qty, 0);
  const el = document.getElementById('cartCount');
  if(el) el.textContent = qty;
}
function showToast(msg){
  const t = document.getElementById('menuToast');
  if(!t) return;
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 1200);
}
function quickAdd(id){
  const item = getItem(id);
  if(!item) return;
  const cart = loadCart();
  const existing = cart.find(x=>x.id===id);
  if(existing) existing.qty += 1;
  else cart.push({id:item.id,name:item.name,price:item.price,img:item.img,qty:1});
  saveCart(cart);
  updateCartCount();
  showToast(`${item.name} added to cart`);
}
function goToHomeCart(){ window.location.href = 'zaiqa_restaurant.html?openCart=1'; }

async function loadProvidedImages(){
  return Promise.resolve();
}

async function initMenu(){
  renderFilters();
  await loadProvidedImages();
  renderCards();
  updateCartCount();
}

initMenu();
