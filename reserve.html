<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reserve - Zaiqa</title>
<link rel="stylesheet" href="theme.css">
</head>
<body>
<nav id="mainNav">
  <a class="nav-logo-wrap" href="index.html">
    <div class="nav-logo">ZAIQA</div>
    <div class="nav-logo-sub">Authentic Flavours</div>
  </a>
  <ul class="nav-links">
    <li><a href="our-story.html">Our Story</a></li>
    <li><a href="cuisines.html">Cuisines</a></li>
    <li><a href="menu.html">Menu</a></li>
    <li><a href="experience.html">Experience</a></li>
    <li><a class="active" href="reserve.html">Reserve</a></li>
    <li><a href="location.html">Location</a></li>
  </ul>
  <div class="nav-right">
    <button class="nav-cart" onclick="goToHomeCart()">
      Cart <span class="cart-count" id="cartCount">0</span>
    </button>
  </div>
</nav>
<main>
  <section class="page-hero">
    <div class="parallax-bg" style="background-image:url('https://images.unsplash.com/photo-1551218808-94e220e084d2?auto=format&fit=crop&w=1800&q=80')"></div>
    <div class="parallax-layer"></div>
    <div class="hero-inner reveal">
      <div class="eyebrow">Reservations</div>
      <h1>Book Your Table Tonight.</h1>
      <p class="hero-copy">Reserve a premium dining slot and we’ll prepare your table with your preferred seating and service pace.</p>
    </div>
  </section>

  <section class="section">
    <div class="wrap grid-2">
      <div class="form-card reveal-left">
        <h3 style="font-family:var(--serif);font-size:34px;margin-bottom:12px">Reservation Form</h3>
        <label>Full Name</label><input type="text" placeholder="Ahmed Khan">
        <label>Phone</label><input type="text" placeholder="+92 300 0000000">
        <label>Date</label><input type="date">
        <label>Guests</label><select><option>2 Guests</option><option>4 Guests</option><option>6 Guests</option><option>8+ Guests</option></select>
        <label>Special Request</label><textarea rows="4" placeholder="Anniversary, dietary, seating preference"></textarea>
        <button type="button">Confirm Reservation</button>
      </div>
      <article class="card reveal-right">
        <div class="card-media" style="height:100%;min-height:520px;background-image:url('https://images.unsplash.com/photo-1559339352-11d035aa65de?auto=format&fit=crop&w=1200&q=80')"></div>
      </article>
    </div>
  </section>
</main>
<footer>Copyright 2026 Zaiqa Restaurant</footer>
<script src="theme.js"></script>
</body>
</html>
